<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員工請假系統 | Leave Application System</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 500px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin: 0 auto; }
        h2 { text-align: center; color: #333; margin-bottom: 25px; font-weight: 600; font-size: 22px; line-height: 1.4; }
        .form-group { margin-bottom: 20px; }
        .time-range-group { display: flex; gap: 15px; }
        .time-range-group .form-group { flex: 1; margin-bottom: 0; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: bold; font-size: 14px; }
        label span { font-size: 12px; color: #777; font-weight: normal; margin-left: 4px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 15px; transition: border 0.3s; }
        input:focus, textarea:focus, select:focus { border-color: #4CAF50; outline: none; }
        input[readonly] { background-color: #f9f9f9; color: #666; cursor: not-allowed; }
        button { width: 100%; padding: 14px; background-color: #4CAF50; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #45a049; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        
        /* 彈出 LINE 複製框樣式 */
        .result-box { display: none; margin-top: 25px; padding: 20px; background-color: #e8f5e9; border: 1px solid #c8e6c9; border-radius: 8px; }
        .result-box h3 { margin-top: 0; color: #2e7d32; font-size: 15px; display: flex; justify-content: space-between; align-items: center; }
        .copy-btn { width: auto; padding: 6px 12px; font-size: 13px; background-color: #2e7d32; margin-bottom: 0; }
        .copy-btn:hover { background-color: #1b5e20; }
        .text-output { width: 100%; height: 230px; background-color: #fff; border: 1px solid #c8e6c9; border-radius: 4px; padding: 10px; font-size: 13px; color: #333; resize: none; font-family: monospace; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h2>員工請假單<br><span style="font-size: 16px; color: #666; font-weight: normal;">Leave Application Form</span></h2>
    <form id="leaveForm">
        
        <div class="form-group">
            <label>所屬部門 <span>Department</span></label>
            <select id="department" required>
                <option value="" disabled selected>請選擇部門 / Select Department</option>
                <option value="製造部">製造部 / Manufacturing</option>
                <option value="管理部">管理部 / Management</option>
                <option value="業務部">業務部 / Sales</option>
                <option value="行銷部">行銷部 / Marketing</option>
                <option value="技術研發部">技術研發部 / R&D</option>
                <option value="財會部">財會部 / Finance</option>
            </select>
        </div>

        <div class="form-group">
            <label>請假人姓名 <span>Name</span></label>
            <input type="text" id="name" required placeholder="請輸入姓名 / Enter your name">
        </div>

        <div class="form-group">
            <label>請假日期 <span>Date</span></label>
            <input type="date" id="date" required>
        </div>

        <div class="form-group">
            <label>請假種類 <span>Type of Leave</span></label>
            <select id="leaveType" required>
                <option value="" disabled selected>請選擇請假種類 / Select Leave Type</option>
                <option value="特休">特休 / Annual Leave</option>
                <option value="事假">事假 / Personal Leave</option>
                <option value="公假">公假 / Official Leave</option>
                <option value="病假">病假 / Sick Leave</option>
                <option value="其他">其他 / Other</option>
            </select>
        </div>

        <div class="time-range-group form-group">
            <div class="form-group">
                <label>開始時間 <span>Start Time</span></label>
                <input type="time" id="startTime" required step="1800">
            </div>
            <div class="form-group">
                <label>結束時間 <span>End Time</span></label>
                <input type="time" id="endTime" required step="1800">
            </div>
        </div>

        <div class="form-group">
            <label>請假時數 <span>Total Hours</span></label>
            <input type="number" id="hours" readonly placeholder="系統自動計算 / Auto calculated" step="0.5">
        </div>

        <div class="form-group">
            <label>請假事由 <span>Reason for Leave</span></label>
            <textarea id="reason" rows="3" required placeholder="請註明原因 / State your reason"></textarea>
        </div>

        <button type="submit" id="submitBtn">送出請假申請 / Submit</button>
    </form>

    <div class="result-box" id="resultBox">
        <h3>
            <span>📋 請複製文字貼到 LINE 群組 (Please copy to LINE)</span>
            <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">一鍵複製 / Copy</button>
        </h3>
        <textarea class="text-output" id="textOutput" readonly></textarea>
    </div>
</div>

<script>
    const gasWebUrl = "https://script.google.com/macros/s/AKfycbzUhkp0A2__Mnf-A3nD2fjBVLfGExLXiNnl3CDJbKU3Ykg0Ua85G9fN9kYWdaz1GhXN/exec"; 

    const startTimeInput = document.getElementById('startTime');
    const endTimeInput = document.getElementById('endTime');
    const hoursInput = document.getElementById('hours');

    [startTimeInput, endTimeInput].forEach(input => {
        input.addEventListener('change', calculateHours);
    });

    function calculateHours() {
        const start = startTimeInput.value;
        const end = endTimeInput.value;
        
        if (start && end) {
            const startParts = start.split(':');
            const endParts = end.split(':');
            const startMinutes = parseInt(startParts[0], 10) * 60 + parseInt(startParts[1], 10);
            const endMinutes = parseInt(endParts[0], 10) * 60 + parseInt(endParts[1], 10);
            let diffMinutes = endMinutes - startMinutes;
            
            if (diffMinutes <= 0) {
                hoursInput.value = "";
                return;
            }
            hoursInput.value = parseFloat((diffMinutes / 60).toFixed(1));
        }
    }

    document.getElementById('leaveForm').addEventListener('submit', function(e) {
        e.preventDefault();
        if (!hoursInput.value || parseFloat(hoursInput.value) <= 0) {
            alert('❌ 結束時間必須晚於開始時間！\nEnd time must be later than start time!');
            return;
        }
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = "處理中... / Processing...";

        const formattedTimeRange = `${startTimeInput.value} ~ ${endTimeInput.value}`;
        const selectedDept = document.getElementById('department').value;
        const selectedLeaveType = document.getElementById('leaveType').value;
        
        // 部門中英對照
        const deptMap = {
            "製造部": "製造部 (Manufacturing)",
            "管理部": "管理部 (Management)",
            "業務部": "業務部 (Sales)",
            "行銷部": "行銷部 (Marketing)",
            "技術研發部": "技術研發部 (R&D)",
            "財會部": "財會部 (Finance)"
        };
        const displayDept = deptMap[selectedDept] || selectedDept;

        // 請假種類中英對照
        const leaveTypeMap = {
            "特休": "特休 (Annual Leave)",
            "事假": "事假 (Personal Leave)",
            "公假": "公假 (Official Leave)",
            "病假": "病假 (Sick Leave)",
            "其他": "其他 (Other)"
        };
        const displayLeaveType = leaveTypeMap[selectedLeaveType] || selectedLeaveType;

        const formData = {
            dept: selectedDept, 
            name: document.getElementById('name').value,
            date: document.getElementById('date').value,
            leaveType: selectedLeaveType, // 💡 新增傳遞請假種類給後台
            timeRange: formattedTimeRange,
            hours: hoursInput.value,
            reason: document.getElementById('reason').value
        };

        fetch(gasWebUrl, {
            method: 'POST',
            body: JSON.stringify(formData)
        })
        .then(response => response.json())
        .then(data => {
            if(data.status === 'success') {
                alert('🎉 請假登記成功！\nApplication submitted successfully!');
                
                const lineMessage = `📢 【請假報告 / Leave Notification】\n` +
                                    `▪️ 部門/Dept：${displayDept}\n` +
                                    `▪️ 姓名/Name：${formData.name}\n` +
                                    `▪️ 假別/Type：${displayLeaveType}\n` +
                                    `▪️ 日期/Date：${formData.date}\n` +
                                    `▪️ 時間/Time：${formData.timeRange}\n` +
                                    `▪️ 時數/Hours：${formData.hours} 小時/Hours\n` +
                                    `▪️ 事由/Reason：${formData.reason}`;
                
                document.getElementById('textOutput').value = lineMessage;
                document.getElementById('resultBox').style.display = 'block';
                document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth' });
                document.getElementById('leaveForm').reset();
            } else {
                alert('❌ 發生錯誤，請聯絡管理員。\nError occurred, please contact administrator.');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('❌ 網路連線失敗，請稍後再試！\nConnection failed, please try again.');
        })
        .finally(() => {
            submitBtn.disabled = false;
            submitBtn.innerText = "送出請假申請 / Submit";
        });
    });

    function copyToClipboard() {
        const textOutput = document.getElementById('textOutput');
        textOutput.select();
        textOutput.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(textOutput.value)
            .then(() => {
                const copyBtn = document.getElementById('copyBtn');
                copyBtn.innerText = "✓ 已複製/Copied";
                copyBtn.style.backgroundColor = "#1b5e20";
                setTimeout(() => {
                    copyBtn.innerText = "一鍵複製 / Copy";
                    copyBtn.style.backgroundColor = "#2e7d32";
                }, 2000);
            })
            .catch(() => { alert("複製失敗，請手動複製！/ Copy failed, please copy manually."); });
    }
</script>
</body>
</html>
