<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員工請假系統</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 500px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: 0 auto; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; font-size: 18px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>

<div class="container">
    <h2>員工請假單</h2>
    <form id="leaveForm">
        <div class="form-group">
            <label>請假人姓名</label>
            <input type="text" id="name" required placeholder="請輸入姓名">
        </div>
        <div class="form-group">
            <label>請假日期</label>
            <input type="date" id="date" required>
        </div>
        <div class="form-group">
            <label>請假時間段</label>
            <input type="text" id="timeRange" required placeholder="例如：13:00 ~ 17:00">
        </div>
        <div class="form-group">
            <label>請假時數 (小時)</label>
            <input type="number" id="hours" required min="0.5" step="0.5" placeholder="例如：4">
        </div>
        <div class="form-group">
            <label>請假事由</label>
            <textarea id="reason" rows="3" required placeholder="請註明請假原因"></textarea>
        </div>
        <button type="submit" id="submitBtn">送出請假申請</button>
    </form>
</div>

<script>
    // ⚠️ 這裡貼上你剛剛在 Google GAS 部署後取得的「網路應用程式網址」
    const gasWebUrl = "https://script.google.com/macros/s/AKfycbwRgGdQvDBirRsiPkAIw-GQJQzKAS-Z3mW2rpUjL15F4pQRvdwfzPt9k0jkFxZpommQ/exec";

    document.getElementById('leaveForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = "處理中，請稍候...";

        // 收集表單資料
        const formData = {
            name: document.getElementById('name').value,
            date: document.getElementById('date').value,
            timeRange: document.getElementById('timeRange').value,
            hours: document.getElementById('hours').value,
            reason: document.getElementById('reason').value
        };

        // 將資料發送到 Google GAS 后台
        fetch(gasWebUrl, {
            method: 'POST',
            body: JSON.stringify(formData)
        })
        .then(response => response.json())
        .then(data => {
            if(data.status === 'success') {
                alert('🎉 請假送出成功，已同步通知 LINE 群組！');
                document.getElementById('leaveForm').reset();
            } else {
                alert('❌ 發生錯誤：' + data.message);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('❌ 網路連線失敗，請稍後再試！');
        })
        .finally(() => {
            submitBtn.disabled = false;
            submitBtn.innerText = "送出請假申請";
        });
    });
</script>

</body>
</html>
